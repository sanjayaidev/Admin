<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connections · ClientPM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2233;
    --navy-2: #232d42;
    --ink: #1f2430;
    --ink-dim: #6b7280;
    --line: #e3e6ec;
    --surface: #ffffff;
    --canvas-bg: #f6f7fb;
    --accent: #3b5bfd;
    --accent-dim: #eef1ff;
    --ok: #16a34a;
    --danger: #dc2626;
    --sans: 'Inter', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--sans); color: var(--ink); background: var(--canvas-bg); }
  a { color: inherit; }
  button { font-family: var(--sans); cursor: pointer; }

  .topbar {
    height: 56px; background: var(--navy); color: #fff; display: flex; align-items: center;
    padding: 0 20px; gap: 16px;
  }
  .brand { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
  .topbar .spacer { flex: 1; }
  .top-link { font-size: 13px; color: #c7cde0; text-decoration: none; padding: 6px 10px; border-radius: 6px; }
  .top-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .keypill { font-family: var(--mono); font-size: 11px; color: #c7cde0; background: rgba(255,255,255,0.08); padding: 6px 10px; border-radius: 6px; }

  .wrap { max-width: 900px; margin: 40px auto; padding: 0 20px 80px; }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 20px; margin-bottom: 22px; }
  .panel h2 { font-size: 16px; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
  .panel p.intro { color: var(--ink-dim); font-size: 14px; margin-top: -8px; }

  .module-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--line); }
  .module-row:last-child { border-bottom: none; }
  .module-name { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
  .socket { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #9aa3b8; position: relative; flex-shrink: 0; }
  .socket.on { border-color: var(--ok); background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .conn-label { font-family: var(--mono); font-size: 12px; color: var(--ink-dim); display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .conn-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--canvas-bg); border: 1px solid var(--line); border-radius: 999px; padding: 2px 4px 2px 8px; font-size: 12px; }
  .conn-chip-x { border: none; background: none; color: var(--danger); font-size: 13px; line-height: 1; cursor: pointer; padding: 2px 4px; border-radius: 50%; }
  .conn-chip-x:hover { background: rgba(220,38,38,0.12); }

  .btn { background: var(--accent); color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn:hover { background: #2b4ae0; }
  .btn.ghost { background: transparent; border: 1px solid var(--line); color: var(--ink); }
  .btn.ghost:hover { border-color: var(--accent); }
  .btn.small { padding: 6px 10px; font-size: 12px; }
  .btn.danger { background: var(--danger); }

  .msg { font-size: 13px; padding: 10px 12px; border-radius: 6px; margin-bottom: 14px; }
  .msg.error { background: rgba(220,38,38,0.1); color: var(--danger); border: 1px solid rgba(220,38,38,0.3); }
  .msg.success { background: rgba(22,163,74,0.1); color: var(--ok); border: 1px solid rgba(22,163,74,0.3); }

  .empty { color: var(--ink-dim); font-size: 13px; padding: 20px 0; text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Manage Connections</div>
  <div class="spacer"></div>
  <a class="top-link" href="https://googleapis-r8qg.onrender.com">Flow Builder</a>
  <a class="top-link" href="/dashboard.html">Dashboard</a>
</div>

<div class="wrap">
  <div id="banner"></div>

  <div class="panel">
    <h2>🔗 Google Integrations</h2>
    <p class="intro">Connect your Google accounts to use in flows. Each module can have multiple connections.</p>
    <div id="moduleList"></div>
  </div>
</div>

<script src="js/connections.js"></script>
</body>
</html>
