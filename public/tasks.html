<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks · ClientPM</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/tasks.css" />
</head>
<body>

  <nav class="navbar">
    <span class="brand">ClientPM</span>
    <a href="/">Dashboard</a>
    <a href="/clients.html">Clients</a>
    <a href="/tasks.html" class="active">Tasks</a>
    <a href="/calendar.html">Calendar</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Tasks</h1>
        <p id="task-count">Loading...</p>
      </div>
      <button class="btn" onclick="openCreateModal()">+ Add Task</button>
    </div>

    <!-- Filters -->
    <div class="filters-bar" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; align-items:center;">
      <select id="filter-client" onchange="render()">
        <option value="">All Clients</option>
      </select>
      <select id="filter-status" onchange="render()">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="review">Review</option>
        <option value="completed">Completed</option>
      </select>
      <select id="filter-payment" onchange="render()">
        <option value="">All Payment</option>
        <option value="unpaid">Unpaid</option>
        <option value="partial">Partial</option>
        <option value="paid">Paid</option>
      </select>
      <button class="btn outline" onclick="clearFilters()">Clear Filters</button>
    </div>

    <div id="tasks-list"></div>
  </div>

  <!-- Create / Edit Task Modal -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal-box">
      <h3 id="modal-title">Add Task</h3>
      <input type="hidden" id="edit-id" />
      
      <label>Client *</label>
      <select id="f-client"></select>
      
      <label>Title *</label>
      <input id="f-title" type="text" placeholder="Task title" />
      
      <label>Description</label>
      <textarea id="f-description" rows="3" placeholder="Task details..."></textarea>
      
      <div class="field-row">
        <div>
          <label>Status</label>
          <select id="f-status">
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="review">Review</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div>
          <label>Priority</label>
          <select id="f-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      
      <div class="field-row">
        <div>
          <label>Due Date</label>
          <input id="f-due-date" type="date" />
        </div>
        <div>
          <label>Amount (₹)</label>
          <input id="f-amount" type="number" step="0.01" placeholder="0.00" />
        </div>
      </div>
      
      <label>Payment Status</label>
      <select id="f-payment-status">
        <option value="unpaid">Unpaid</option>
        <option value="partial">Partial</option>
        <option value="paid">Paid</option>
      </select>
      
      <div class="modal-actions">
        <button class="btn outline" onclick="closeModal()">Cancel</button>
        <button class="btn" id="save-btn" onclick="saveTask()">Create</button>
      </div>
    </div>
  </div>

  <!-- Delete confirm modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-box" style="max-width: 380px;">
      <h3>Delete Task</h3>
      <p style="font-size: 14px; color: #6b7280;">This will permanently delete this task. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn outline" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/tasks.js"></script>
</body>
</html>
