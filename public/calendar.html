<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar · ClientPM</title>
  
  <style>
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .calendar-nav { display: flex; gap: 8px; align-items: center; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e5e7eb; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
    .calendar-day-header { background: #f9fafb; padding: 12px 8px; text-align: center; font-size: 12px; font-weight: 600; color: #6b7280; }
    .calendar-day { background: white; min-height: 100px; padding: 8px; position: relative; }
    .calendar-day.other-month { background: #f9fafb; color: #9ca3af; }
    .calendar-day.today { background: #fefce8; }
    .calendar-day-number { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .calendar-event { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .calendar-event.task { background: #dbeafe; color: #1e40af; }
    .calendar-event.meeting { background: #ede9fe; color: #5b21b6; }
    .calendar-event.deadline { background: #fee2e2; color: #991b1b; }
    .view-toggle { display: flex; gap: 4px; }
    .view-toggle button { padding: 6px 12px; font-size: 13px; border: 1px solid #d1d5db; background: white; cursor: pointer; border-radius: 6px; }
    .view-toggle button.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    .month-name { font-size: 18px; font-weight: 600; }
    .event-list { margin-top: 20px; }
    .event-item { display: flex; gap: 12px; padding: 12px; border-bottom: 1px solid #f3f4f6; align-items: flex-start; }
    .event-date-box { min-width: 60px; text-align: center; padding: 8px; background: #f9fafb; border-radius: 8px; }
    .event-date-day { font-size: 20px; font-weight: 700; color: #111827; }
    .event-date-month { font-size: 12px; color: #6b7280; text-transform: uppercase; }
    .event-details { flex: 1; }
    .event-title { font-weight: 500; margin-bottom: 4px; }
    .event-meta { font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="brand">ClientPM</span>
    <a href="/">Dashboard</a>
    <a href="/clients.html">Clients</a>
    <a href="/tasks.html">Tasks</a>
    <a href="/calendar.html" class="active">Calendar</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Calendar</h1>
        <p id="event-count">Loading...</p>
      </div>
      <button class="btn" onclick="openCreateModal()">+ Add Event</button>
    </div>

    <!-- Filters -->
    <div class="filters-bar" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; align-items:center;">
      <select id="filter-client" onchange="loadEvents()">
        <option value="">All Clients</option>
      </select>
      <select id="filter-type" onchange="render()">
        <option value="">All Types</option>
        <option value="task">Tasks</option>
        <option value="meeting">Meetings</option>
        <option value="deadline">Deadlines</option>
      </select>
    </div>

    <!-- Calendar View Controls -->
    <div class="calendar-header">
      <div class="calendar-nav">
        <button class="btn outline" onclick="previousPeriod()">← Prev</button>
        <span class="month-name" id="current-period"></span>
        <button class="btn outline" onclick="nextPeriod()">Next →</button>
        <button class="btn outline" onclick="goToToday()">Today</button>
      </div>
      <div class="view-toggle">
        <button class="active" data-view="month" onclick="setView('month')">Month</button>
        <button data-view="week" onclick="setView('week')">Week</button>
      </div>
    </div>

    <!-- Month View Grid -->
    <div id="month-view">
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <!-- Week View (simplified as list) -->
    <div id="week-view" style="display:none;" class="event-list"></div>

    <!-- Event List Below Calendar -->
    <div class="event-list" id="event-list"></div>
  </div>

  <!-- Create / Edit Event Modal -->
  <div class="modal-overlay" id="event-modal">
    <div class="modal-box">
      <h3 id="modal-title">Add Event</h3>
      <input type="hidden" id="edit-id" />
      
      <label>Title *</label>
      <input id="f-title" placeholder="Event title" />
      
      <label>Description</label>
      <textarea id="f-description" rows="3" placeholder="Event details..."></textarea>
      
      <div class="field-row">
        <div>
          <label>Date & Time *</label>
          <input id="f-event-date" type="datetime-local" />
        </div>
        <div>
          <label>Type</label>
          <select id="f-event-type">
            <option value="task">Task</option>
            <option value="meeting">Meeting</option>
            <option value="deadline">Deadline</option>
          </select>
        </div>
      </div>
      
      <label>Link to Task (optional)</label>
      <select id="f-work-item">
        <option value="">No link</option>
      </select>
      
      <div class="modal-actions">
        <button class="btn outline" onclick="closeModal()">Cancel</button>
        <button class="btn" id="save-btn" onclick="saveEvent()">Create</button>
      </div>
    </div>
  </div>

  <!-- Delete confirm modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-box" style="max-width: 380px;">
      <h3>Delete Event</h3>
      <p style="font-size: 14px; color: #6b7280;">This will permanently delete this event.</p>
      <div class="modal-actions">
        <button class="btn outline" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/calendar.js"></script>
</body>
</html>
