<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Client Portal · ClientPM</title>
  
  <style>
    .portal-header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; padding: 40px 32px; border-radius: 12px; margin-bottom: 24px; }
    .portal-header h1 { margin: 0 0 8px; font-size: 28px; }
    .portal-header p { margin: 0; opacity: 0.9; }
    .payment-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .summary-card { background: white; border: 1px solid #f3f4f6; border-radius: 12px; padding: 20px; text-align: center; }
    .summary-card.paid { border-color: #d1fae5; background: #f0fdf4; }
    .summary-card.partial { border-color: #fed7aa; background: #fff7ed; }
    .summary-card.unpaid { border-color: #fee2e2; background: #fef2f2; }
    .summary-label { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
    .summary-value { font-size: 28px; font-weight: 700; }
    .summary-card.paid .summary-value { color: #059669; }
    .summary-card.partial .summary-value { color: #ea580c; }
    .summary-card.unpaid .summary-value { color: #dc2626; }
    .filter-section { background: white; border: 1px solid #f3f4f6; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .filter-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 12px; font-weight: 500; color: #6b7280; }
  </style>
</head>
<body style="background: #f3f4f6;">

  <div class="page" style="max-width: 1200px;">
    <!-- Header -->
    <div class="portal-header" id="client-header">
      <h1>Loading...</h1>
      <p>Your project overview and payment summary</p>
    </div>

    <!-- Payment Summary -->
    <div class="payment-summary" id="payment-summary">
      <div class="summary-card">
        <div class="summary-label">Total Billed</div>
        <div class="summary-value" id="total-amount">₹0</div>
      </div>
      <div class="summary-card paid">
        <div class="summary-label">Paid</div>
        <div class="summary-value" id="paid-amount">₹0</div>
      </div>
      <div class="summary-card partial">
        <div class="summary-label">Partial</div>
        <div class="summary-value" id="partial-amount">₹0</div>
      </div>
      <div class="summary-card unpaid">
        <div class="summary-label">Outstanding</div>
        <div class="summary-value" id="unpaid-amount">₹0</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-section">
      <div class="filter-row">
        <div class="filter-group">
          <label>Date From</label>
          <input type="date" id="filter-from" onchange="applyFilters()" />
        </div>
        <div class="filter-group">
          <label>Date To</label>
          <input type="date" id="filter-to" onchange="applyFilters()" />
        </div>
        <div class="filter-group">
          <label>Status</label>
          <select id="filter-status" onchange="applyFilters()">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="review">Review</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="filter-group">
          <label>&nbsp;</label>
          <button class="btn outline" onclick="clearFilters()">Clear Filters</button>
        </div>
      </div>
    </div>

    <!-- Tasks Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Task</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Due Date</th>
            <th>Amount</th>
            <th>Payment Status</th>
          </tr>
        </thead>
        <tbody id="tasks-body">
          <tr><td colspan="6" style="text-align:center; padding:40px; color:#9ca3af;">Loading tasks...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Footer -->
    <div style="text-align:center; margin-top:40px; color:#9ca3af; font-size:13px;">
      <p>Powered by ClientPM</p>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/share.js"></script>
</body>
</html>
